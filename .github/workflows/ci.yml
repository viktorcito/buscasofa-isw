name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar backend
        working-directory: server
        run: npm install

      - name: Arrancar backend (libSQL)
        working-directory: server
        run: node index_dev.js &

      - name: Instalar frontend
        working-directory: app
        run: npm install

      - name: Pruebas unitarias (Vitest)
        working-directory: app
        run: npm run test:unit

      - name: Pruebas e2e (Cypress + Cucumber)
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          install: false
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120

      - name: Pruebas de componente (Cypress)
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          install: false
          component: true
